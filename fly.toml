# fly.toml app configuration file generated for playtaipan on 2026-07-11T20:53:36Z
#
# See https://fly.io/docs/reference/configuration/ for information about how to use this file.
#

app = 'playtaipan'
primary_region = 'ord'

[build]

[[mounts]]
  source = 'saves'
  destination = '/app/saves'

[http_service]
  # The app listens on 8000 (see Dockerfile ENV PORT).
  internal_port = 8000
  force_https = true
  # Scale-to-zero is safe: sessions are event-sourced on the volume
  # and replay on the next request after a cold start.
  auto_stop_machines = 'stop'
  auto_start_machines = true
  min_machines_running = 0
  processes = ['app']

[[vm]]
  memory = '512mb'
  cpu_kind = 'shared'
  cpus = 1
